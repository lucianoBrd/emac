name: Automatic Deploy to GitHub Pages

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Install
        run: npm install
      - name: GitHub Build
        run: npm run github-build
      - name: GitHub Deploy
        run: npm run github-deploy
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GH_PAGES }}
