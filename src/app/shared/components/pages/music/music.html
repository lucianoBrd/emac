<div class="container music-container">
  <div class="row">
    <div class="col-md-10 offset-md-1">
      <div class="play-bg d-flex">
        <div class="song-text-container h-100">
          <div class="d-flex h-100">
            <div class="center-img">
              <img
                src="assets/images/promotion/col-bourgoin.png"
                alt=""
                class="img-fluid"
              />
            </div>
            <div class="song-text">
              <h5 class="text-white song-head">Latest Song</h5>
              <h6 class="text-white song-sub-head">Zrial doj</h6>
            </div>
          </div>
        </div>
        <div class="play-setting m-auto">
          <div id="jquery_jplayer_1" class="jp-jplayer"></div>
          <div
            id="jp_container_1"
            class="jp-audio"
            role="application"
            aria-label="media player"
          >
            <div class="jp-type-playlist">
              <div class="jp-gui jp-interface p-0 d-flex">
                <div class="jp-controls">
                  <button
                    class="jp-play m-r-15"
                    role="button"
                    tabindex="0"
                  ></button>
                </div>
                <a><i class="fa fa-ellipsis-v" aria-hidden="true"></i></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
