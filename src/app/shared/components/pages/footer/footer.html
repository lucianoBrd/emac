<!--contact section start-->
<footer
  class="event contact set-relative bg bg-img bg-about p-b-0"
  id="contact"
  [style.background-image]="'url(' + footer.background + ')'"
>
  <div class="container p-b-150">
    <div class="row">
      <div class="col-md-10 offset-md-1">
        <div class="title title3">
          <div class="main-title">
            <h2 class="text-white">{{footer.title}}</h2>
          </div>
        </div>
      </div>
      <div class="col-xl-5 offset-xl-1 col-md-6 p-r-0 map">
        <div class="iframe-container"
             [style.background-image]="'url(' + footer.image + ')'"
             [style.background-size]="'cover'"
        ></div>
      </div>
      <div class="col-xl-5 p-l-0 col-md-6 set-z-index form-footer">
        <div class="bg-white">
          <form>
            <ul class="title title3">
                @for (text of footer.text; track text) {
                    <li>
                        <h6 class="main-title">
                        <i class="fa fa-angle-double-right mr-2" aria-hidden="true"></i>
                        <span>{{text}}</span>
                        </h6>
                    </li>
                }
            </ul>
          </form>
        </div>
      </div>
    </div>
  </div>
    @if (footer.logo) {
        <img [src]="footer.logo" alt="logo" class="set-abs top-0 plane2" />
        <img [src]="footer.logo" alt="logo" class="set-abs bottom-0 plane" />
    }
</footer>
<!--contact section end-->
