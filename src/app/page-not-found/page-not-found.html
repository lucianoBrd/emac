<!--section 404 start-->
<div class="bg-purple">
  <div class="section-404">
    <div
      class="stars"
      [style.background-image]="'url(assets/images/404/overlay_stars.svg)'"
    >
      <div class="container">
        <div class="row">
          <div class="col-md-8 offset-md-2 col-12">
            <div class="central-body">
              <h1 class="text-inner">404</h1>
              <h3 class="sub-text text-white">
                {{wordings.page_not_found.title}}
              </h3>
              <p class="text-404 text-white text-center">
                {{wordings.page_not_found.description}}
              </p>
              <a
                [routerLink]="['/']"
                class="btn btn-default primary-btn transparent m-t-20"
              >
                {{wordings.general.goHome}}
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="objects">
      <img alt class="object_rocket" src="assets/images/logo/emac.svg" />
      <div class="earth-moon">
        <img alt class="object_earth" src="assets/images/404/earth.svg" />
        <img alt class="object_moon" src="assets/images/404/moon.svg" />
      </div>
      <div class="box_astronaut">
        <img alt class="object_astronaut" src="assets/images/logo/emac.svg" />
      </div>
    </div>
    <div class="glowing_stars">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>
  </div>
</div>
<!--section 404 end-->
