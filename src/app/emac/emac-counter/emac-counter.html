<!--counter section start-->
<section
  class="event counter set-relative bg bg-img3 bg-about"
  [style.background-image]="'url(assets/images/emac/bg3.jpg)'"
>
  <div class="container">
    <div class="row">
      @for(counter of counters; track counter.id){
      <div class="col-md-3 col-6 counter-container">
        <div class="counters">
            <i class="fa fa-{{counter.icon}} counter-img" aria-hidden="true"></i>
          <div class="counter-text">
            <h2 class="count-number text-center text-white counts">
              <span class="counter">{{ counter.count }}</span>
            </h2>
            <h6 class="count-desc text-center text-white">{{counter.title}}</h6>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
</section>
<!--counter section end-->
