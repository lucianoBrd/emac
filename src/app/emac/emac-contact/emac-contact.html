<!--contact section start-->
<footer
  class="event contact set-relative bg bg-img bg-about p-b-0"
  id="contact"
  [style.background-image]="'url(assets/images/emac/bg4.jpg)'"
>
  <div class="container p-b-150">
    <div class="row">
      <div class="col-md-10 offset-md-1">
        <div class="title title3">
          <div class="main-title">
            <h2 class="text-white">Contact</h2>
          </div>
        </div>
      </div>
      <div class="col-xl-5 offset-xl-1 col-md-6 p-r-0 map">
        <div class="iframe-container">
          <iframe
            src="https://maps.google.com/maps?width=100%&amp;height=100%&amp;hl=fr&amp;q=france École militaire des aspirants de Coëtquidan&amp;t=&amp;z=14&amp;ie=UTF8&amp;iwloc=B&amp;output=embed"
          ></iframe>
        </div>
      </div>
      <div class="col-xl-5 p-l-0 col-md-6 set-z-index form-footer">
        <div class="bg-white">
          <form>
            <ul class="title title3">
                @for (address of wording.address; track address) {
                    <li>
                        <h6 class="main-title">
                        <i class="fa fa-angle-double-right mr-2" aria-hidden="true"></i>
                        <span>{{address}}</span>
                        </h6>
                    </li>
                }

            </ul>
          </form>
        </div>
      </div>
    </div>
  </div>
  <img src="assets/images/emac/emac.png" alt="emac" class="set-abs top-0 plane2" />
  <img src="assets/images/emac/emac.png" alt="emac" class="set-abs bottom-0 plane" />
</footer>
<!--contact section end-->
