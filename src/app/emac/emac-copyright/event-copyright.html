<!--copyright section start-->
<div class="event copyright flex">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-6">
        <div class="link-horizontal d-flex align-content-lg-center h-100">
          <ul>
              @for (social of socials; track social.id) {
                  <li>
                      <a href="{{social.link}}" target="_blank" class="center-content">
                          <i class="fa fa-{{social.icon}}" aria-hidden="true" title="{{social.title}}"></i>
                      </a>
                  </li>
              }
              <li>
                  <a class="center-content" href="/sitemap.xml">{{wordings.general.sitemap}}</a>
              </li>
              <li>
                  <a class="center-content" (click)="openVerticallyCentered(content)">{{wordings.privacy_policy.title}}</a>
              </li>

              <ng-template #content let-modal>
                  <div class="login-modal">
                      <div class="modal-header">
                          <button class="close" type="button" (click)="modal.dismiss('Cross click')">
                              <span aria-hidden="true">&times;</span>
                          </button>
                      </div>
                      <div class="modal-body">
                          <h3 class="m-b-20">{{wordings.privacy_policy.title}}</h3>

                          <div [innerHTML]="wordings.privacy_policy.description"></div>

                          <a class="btn btn-default primary-btn m-t-20" (click)="modal.dismiss('Cross click')">
                              {{wordings.general.close}}
                          </a>
                      </div>
                  </div>
              </ng-template>
          </ul>
        </div>
      </div>
      <div class="col-md-6">
        <p class="copyright-text text-right text-white">
          ©{{year}} {{wordings.app_name}}.
        </p>
      </div>
    </div>
  </div>
</div>
<!--copyright section end-->
<app-tap-to-top></app-tap-to-top>
