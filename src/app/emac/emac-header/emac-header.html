<!-- header Start-->
<section class="music header" id="header">

    <div class="music-content">
        <div
                class="music-bg bg bg-shadow-top"
                [style.background-image]="'url(assets/images/emac/header.jpg)'"
        >
            <div
                    class="text-center w-100"
                    aTilt
                    data-tilt
                    data-tilt-max="3"
                    data-tilt-speed="400"
                    data-tilt-perspective="400"
            >
                <div class="img-height">
                    <img src="assets/images/logo/emac.svg" alt="emac" class="img-fluid" />
                </div>
            </div>
        </div>
    </div>
    <div class="left-side">
        <h6 class="follow-text">École militaire</h6>
        <h6 class="follow-text">des aspirants</h6>
        <h6 class="follow-text">de Coëtquidan</h6>
    </div>
</section>
