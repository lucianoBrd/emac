<!-- about section Start-->
<section
  class="event about bg bg-img bg-about"
  [style.background-image]="'url(assets/images/emac/bg2.jpg)'"
>
  <div class="container">
    <div class="row">
      <div class="col-md-10 offset-md-1">
        <div class="title title3">
          <div class="main-title">
            <h2 class="text-white" [innerHTML]="wording.emac.about.title"></h2>
          </div>
        </div>
      </div>
      <div class="col-lg-4 offset-lg-1 col-md-6">
        <div class="text-right">
          <div class="announcer-img">
            <img src="assets/images/general/about.jpg" alt="about" class="img-fluid" />
            <img src="assets/images/general/about.jpg" alt="about" class="img-fluid" />
            <img
              src="assets/images/emac/emac.jpg"
              alt="emac"
              class="img-fluid"
              aTilt
              data-tilt
              data-tilt-max="3"
              data-tilt-speed="400"
              data-tilt-perspective="500"
            />
          </div>
        </div>
      </div>
      <div class="col-xl-5 offset-xl-1 col-lg-7 col-md-6">
        <div class="abouts center-text">
          <div class="format">
            <div class="format-small-text">
              <h6 class="text-white borders-before text-uppercase">
                <span>{{wording.emac.about.class}}</span>
              </h6>
            </div>
            <div class="format-head-text">
              <h3 class="about-font-header text-white">
                  {{wording.emac.about.school_class}}
              </h3>
            </div>
            <div class="format-sub-text" ngbAccordion [closeOthers]="true">
                <div ngbAccordionItem [collapsed]="true">
                    <div ngbAccordionHeader>
                        @for (about of abouts.slice(0, 2); track about.id) {
                            <p class="about-para p-light">
                                {{about.description}}
                            </p>
                        }
                        @if (abouts.length > 2) {
                            <button class="btn btn-default" ngbAccordionButton>
                                <div class="fa fa-angle-right rotate"></div>
                                {{wording.general.learn_more}}
                            </button>
                        }
                    </div>
                    <div ngbAccordionCollapse>
                        <div ngbAccordionBody>
                            <ng-template>
                                @for (about of abouts.slice(2, abouts.length); track about.id) {
                                    <p class="about-para p-light">
                                        {{about.description}}
                                    </p>
                                }
                            </ng-template>
                        </div>
                    </div>
                </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- about section end-->
