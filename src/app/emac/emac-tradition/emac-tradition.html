<!--speaker section start-->
<section class="event speaker" id="speaker">
    <div class="circle"></div>
    <div class="container">
        <div class="row">
            <div class="col-md-10 offset-md-1">
                <div class="title title3">
                    <div class="main-title">
                        <h2 [innerHTML]="tradition.title"></h2>
                    </div>
                    <div class="sub-title">
                        <p class="dark" [innerHTML]="tradition.description"></p>
                    </div>
                </div>
            </div>
            @for(t of tradition.tradition; track t){
                <div class="col-md-3 col-sm-6 speker-container">
                    <div class="text-center">
                        <div class="team-img">
                            <img [src]="t.image" alt="{{t.title}}" class="img-fluid" />
                            <div class="overlay"></div>
                            <div class="social">
                                <ul>
                                    <li>
                                        <a (click)="openVerticallyCentered(content)">
                                            <i class="fa fa-info center-content" aria-hidden="true"></i>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                            <ng-template #content let-modal>
                                <div class="login-modal">
                                    <div class="modal-header">
                                        <button class="close" type="button" (click)="modal.dismiss('Cross click')">
                                            <span aria-hidden="true">&times;</span>
                                        </button>
                                    </div>
                                    <div class="modal-body text-center">
                                        <h3 class="m-b-20">{{t.title}}</h3>
                                        <img [src]="t.image" alt="{{t.title}}" class="img-fluid m-b-20" />
                                        <p>
                                            {{t.description}}
                                        </p>
                                        <a class="btn btn-default primary-btn m-t-20" (click)="modal.dismiss('Cross click')">
                                            {{wordings}}
                                        </a>
                                    </div>
                                </div>
                            </ng-template>
                        </div>
                        <div class="employee">
                            <h5 class="e-name text-center">{{t.title}}</h5>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
</section>
<!--speaker section end-->
